<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- for styles -->
    <link rel="stylesheet" href="./contactUs.css">
    <title>Contact Us | Aura</title>
</head>

<body>
    <header id="header">
        <section id="logo" class=".center-items">
            <a href=""><img src="./img/Aura logo.png" alt=""></a>
            <p>Elevate Your Shopping Experience</p>
        </section>
        <section id="links" class="center-items">
            <a href="../home/home.html">Home</a>
            <a href="../products/products.html">Products</a>
            <a href="">Profile</a>
            <a href="../contactUs/contactUs.html">Contact Us</a>
        </section>
        <section id="icon-button" class="center-items">
            <a href=""><i class="fa-solid fa-bag-shopping"></i></a>
            <a href=""><i class="fa-solid fa-heart"></i></a>
            <a href="../login/login.html"><button id="login-btn">Log In</button></a>
        </section>
    </header>

    <main>
        <section class="contactUs">
            <div class="container">
                <div class="heading">
                    <h2>Reach Out Us!!</h2>
                </div>
                <div class="input-form">
                    <form action="">
                        <input type="text" placeholder="First Name">
                        <br>
                        <input type="text" placeholder="Last Name">
                        <br>
                        <input type="email" placeholder="Your Email Address">
                        <br>
                        <input type="phone" placeholder="Phone Number">
                        <br>
                        <textarea name="" id="" placeholder="Message" rows="4"></textarea>
                        <br>
                        <div class="sub-btn">
                            <button>Submit</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
