<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- for Styles -->
    <link rel="stylesheet" href="./home.css">
    <title>Aura | Elevate Your Shopping Experience</title>

<body>
    <header id="header">
        <section id="logo" class=".center-items">
            <a href=""><img src="./img/Aura logo.png" alt=""></a>

        </section>
        <section id="links" class="center-items">
            <a href="">Home</a>
            <a href="">Products</a>
            <a href="">Profile</a>

            <a href=""><i class="fa-solid fa-heart"></i></a>

    </header>
    <main>
        <div id="aura-welcome-section">
            <h2 class="primary-clr">Welcome to, Aura!</h2>
